services:
  streetlight-pipeline:
    build: .
    container_name: streetlight-pipeline
    hostname: streetlight-pipeline
    ports:
      - "5000:5000"   # Flask frontend (browser)
      - "8000:8000"   # FastAPI backend (optional, for direct API access)
    volumes:
      - ./model:/app/model:ro           # Model files (read-only)
      - ./templates:/app/templates:ro   # HTML templates (read-only)
      - job-data:/data/jobs             # Persist job results
      - model-data:/data/models         # Persist uploaded models
    environment:
      - DETECTION_DATA_DIR=/data/jobs
      - MODELS_DIR=/data/models
      - BACKEND_URL=http://127.0.0.1:8000
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  job-data:
    name: streetlight_job_data
  model-data:
    name: streetlight_model_data