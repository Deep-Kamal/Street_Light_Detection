<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Model Detection Pipeline</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        :root { --bg: #1a1a1a; --card: #232323; --border: #3a3a3a; --text: #ededed; --muted: #a3a3a3; --blue: #f59e0b; --green: #22c55e; --red: #ef4444; --orange: #f59e0b; --purple: #a855f7; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background:
                radial-gradient(ellipse 900px 650px at 12% 0%, rgba(255, 255, 255, 0.08), transparent 60%),
                var(--bg);
            color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        
        /* Header */
        .header { background: rgba(35, 35, 35, 0.85); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .header h1 { font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .health { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
        .dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .dot.fail { background: var(--red); }

        /* Main Layout — 40% controls / 60% map, per spec */
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { flex: 0 0 40%; max-width: 40%; background: var(--bg); border-right: 1px solid var(--border); overflow-y: auto; padding: 20px; }
        .content { flex: 0 0 60%; max-width: 60%; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Components */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
        .card-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Model Switcher */
        .model-list { display: flex; flex-direction: column; gap: 8px; }
        .model-item { padding: 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; background: var(--bg); }
        .model-item:hover { border-color: var(--blue); }
        .model-item.active { border-color: var(--blue); background: rgba(245, 158, 11, 0.12); }
        .model-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .model-details { flex: 1; overflow: hidden; }
        .model-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .model-type { font-size: 11px; color: var(--muted); }
        .active-badge { font-size: 10px; background: var(--blue); color: white; padding: 2px 8px; border-radius: 10px; font-weight: 600; }

        /* Add Model Form */
        .add-form { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .add-form.show { display: block; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
        .form-control { width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; }
        .form-control:focus { outline: none; border-color: var(--blue); }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: var(--blue); color: white; width: 100%; justify-content: center; }
        .btn-sm { background: var(--border); color: var(--text); padding: 4px 10px; font-size: 12px; }
        .btn-sm:hover { background: #404040; }

        /* Upload & Process */
        .upload-zone { border: 2px dashed var(--border); border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .upload-zone:hover { border-color: var(--blue); }
        .upload-zone.filled { border-style: solid; border-color: var(--green); background: rgba(34, 197, 94, 0.05); }
        .upload-zone i { font-size: 24px; color: var(--muted); margin-bottom: 8px; display: block; }
        .upload-zone.filled i { color: var(--green); }
        .upload-zone p { font-size: 13px; color: var(--muted); }
        
        .progress-wrap { display: none; }
        .progress-wrap.show { display: block; }
        .progress-bar { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; margin: 8px 0; }
        .progress-fill { height: 100%; background: var(--blue); width: 0%; transition: width 0.3s; }
        .progress-fill.indeterminate { width: 30% !important; transition: none; animation: progress-indeterminate 1.2s ease-in-out infinite; }
        @keyframes progress-indeterminate {
            0%   { margin-left: 0%; }
            50%  { margin-left: 70%; }
            100% { margin-left: 0%; }
        }
        .status { font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; }
        .status-queued { background: rgba(245, 158, 11, 0.2); color: var(--orange); }
        .status-running { background: rgba(56, 189, 248, 0.18); color: #38bdf8; }
        .status-done { background: rgba(34, 197, 94, 0.2); color: var(--green); }
        .status-failed { background: rgba(239, 68, 68, 0.2); color: var(--red); }

        /* Downloads */
        .downloads { display: none; }
        .downloads.show { display: block; }
        .dl-link { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; color: var(--text); text-decoration: none; font-size: 13px; transition: 0.2s; }
        .dl-link:hover { border-color: var(--green); transform: translateX(4px); }

        /* Map Area */
        .content { display: flex; flex-direction: column; }
        .map-container { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow: hidden; transition: flex 0.25s ease; min-height: 0; }
        /* Minimized state: map shrinks to a thin header strip so the video
           section below can take up most of the content column. */
        .map-container.minimized { flex: 0 0 56px; padding: 12px 20px; }
        .map-container.minimized #map,
        .map-container.minimized .map-stats { display: none; }
        #map { flex: 1; border-radius: 10px; border: 1px solid var(--border); z-index: 1; background: #f2efe9; }
        .leaflet-control-attribution { background: rgba(255, 255, 255, 0.85) !important; color: #475569 !important; font-size: 10px !important; }
        .leaflet-control-attribution a { color: #475569 !important; }
        .leaflet-control-zoom a { background: #ffffff !important; color: #1e293b !important; border-color: #cbd5e1 !important; }
        .leaflet-control-zoom a:hover { background: #f1f5f9 !important; }
        .leaflet-popup-content-wrapper { background: #ffffff !important; color: #1e293b !important; border: 1px solid #cbd5e1 !important; border-radius: 8px !important; box-shadow: 0 10px 25px rgba(0,0,0,0.15) !important; }
        .leaflet-popup-tip { background: #ffffff !important; }
        .leaflet-popup-content { margin: 10px 14px !important; font-size: 12px !important; line-height: 1.5 !important; }
        .map-stats { display: flex; gap: 20px; margin-top: 10px; font-size: 13px; color: var(--muted); }
        .map-stats strong { color: var(--text); }

        /* Video Section — hidden/collapsed until a job's video is played,
           then expands to fill the space the map gives up when minimized. */
        .video-container { flex: 0; padding: 0 20px; display: flex; flex-direction: column; overflow: hidden; opacity: 0; transition: flex 0.25s ease, opacity 0.2s ease; min-height: 0; }
        .video-container.show { flex: 1; padding: 20px; opacity: 1; }
        #resultVideo { flex: 1; width: 100%; min-height: 0; background: #000; border-radius: 10px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-eye" style="color: var(--blue)"></i> Detection Pipeline</h1>
        <div class="health" id="healthStatus"><div class="dot"></div> Connecting...</div>
    </div>

    <div class="main">
        <!-- Sidebar -->
        <div class="sidebar">
            
            <!-- Model Switcher -->
            <div class="card">
                <div class="card-title">
                    <span><i class="fas fa-cube"></i> Active Model</span>
                    <button class="btn btn-sm" onclick="toggleAddModel()"><i class="fas fa-plus"></i> Add New</button>
                </div>
                
                <!-- Add Model Form -->
                <div class="add-form" id="addModelForm">
                    <div class="form-group">
                        <label>Model Name</label>
                        <input type="text" id="newModelName" class="form-control" placeholder="My Custom Model">
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <select id="newModelType" class="form-control">
                            <option value="yolo_detection">YOLO Detection</option>
                            <option value="yolo_segmentation">YOLO Segmentation</option>
                            <option value="custom">Custom</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Model File (.pt)</label>
                        <input type="file" id="newModelFile" class="form-control" accept=".pt,.pth">
                    </div>
                    <button class="btn btn-primary" onclick="uploadNewModel()" style="margin-bottom:10px;">Upload Model</button>
                </div>

                <div class="model-list" id="modelList">
                    <div style="text-align:center; color: var(--muted); padding: 20px;">Loading models...</div>
                </div>
            </div>

            <!-- Upload & Process -->
            <div class="card">
                <div class="card-title">
                    <span><i class="fas fa-upload"></i> Process Video</span>
                    <button class="btn btn-sm" onclick="resetProcessForm()" title="Clear video/CSV and go back to the start"><i class="fas fa-rotate-left"></i> Refresh</button>
                </div>
                
                <div class="upload-zone" id="videoZone" onclick="document.getElementById('videoInput').click()">
                    <input type="file" id="videoInput" accept="video/*" hidden onchange="handleFile(this, 'video')">
                    <i class="fas fa-video"></i>
                    <p id="videoText">Click to upload Video</p>
                </div>

                <div class="upload-zone" id="gpsZone" onclick="document.getElementById('gpsInput').click()">
                    <input type="file" id="gpsInput" accept=".csv" hidden onchange="handleFile(this, 'gps')">
                    <i class="fas fa-map-marker-alt"></i>
                    <p id="gpsText">Click to upload GPS CSV</p>
                </div>

                <button class="btn btn-primary" id="submitBtn" onclick="startProcess()" disabled>
                    <i class="fas fa-play"></i> Start Detection
                </button>
            </div>

            <!-- Progress -->
            <div class="card progress-wrap" id="progressSection">
                <div class="card-title"><i class="fas fa-tasks"></i> Status</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="status status-queued" id="statusBadge">Queued</span>
                    <span style="font-size:13px;" id="pctText">0%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
                <div style="font-size:12px; color:var(--muted);">Job: <span id="jobIdText" style="font-family:monospace">-</span></div>
            </div>

            <!-- Downloads -->
            <div class="card downloads" id="downloadSection">
                <div class="card-title">
                    <span><i class="fas fa-download"></i> Results</span>
                    <div style="display:flex; gap:6px;">
                        <button class="btn btn-sm" id="playVideoBtn" onclick="playCurrentJobVideo()" title="Play this job's output video"><i class="fas fa-play-circle"></i> Play Video</button>
                        <button class="btn btn-sm" id="plotMapBtn" onclick="plotCurrentJobOnMap()" title="Plot this job's lat/long points on the map"><i class="fas fa-map-pin"></i> Plot on Map</button>
                    </div>
                </div>
                <div id="downloadLinks"></div>
            </div>
        </div>

        <!-- Map + Video Content -->
        <div class="content">
            <div class="map-container" id="mapContainer">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <div class="card-title" style="margin:0;"><i class="fas fa-map-marked-alt"></i> GPS Detection Map</div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn btn-sm" onclick="clearMapView()" title="Clear all pins and reset the view - points only reappear when you Plot on Map"><i class="fas fa-eraser"></i> Clear Map</button>
                        <button class="btn btn-sm" id="mapMinimizeBtn" onclick="toggleMapSection()" title="Minimize the map to make room for the video"><i class="fas fa-compress-alt"></i></button>
                    </div>
                </div>
                <div id="map"></div>
                <div class="map-stats">
                    <span>Total Plotted Points: <strong id="pointCount">0</strong></span>
                    <span>Jobs Mapped: <strong id="jobCount">0</strong></span>
                </div>
            </div>

            <!-- Video Player — hidden until "Play Video" is clicked; minimizing
                 the map above gives this section room to show the video larger. -->
            <div class="video-container" id="videoContainer">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <div class="card-title" style="margin:0;"><i class="fas fa-film"></i> Detection Video</div>
                    <button class="btn btn-sm" onclick="closeVideoSection()" title="Stop playback and restore the full-size map"><i class="fas fa-times"></i> Close</button>
                </div>
                <video id="resultVideo" controls preload="auto"></video>
                <div id="videoError" style="display:none; margin-top:8px; font-size:12px; color:var(--red);"></div>
            </div>
        </div>
    </div>

    <script>
        let map, mapMarkers = [];
        let models = [], activeModelId = null;
        let videoFile = null, gpsFile = null;
        let pollInterval = null;
        let currentJobId = null;
        const DEFAULT_CENTER = [20.5937, 78.9629];
        const DEFAULT_ZOOM = 5;

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            fetchHealth();
            fetchModels();
            // The map starts empty and stays that way until you explicitly
            // click "Plot on Map" for a job you just ran. It no longer
            // auto-loads every previously-completed job's points on page
            // load or on "Clear Map" - that old behavior kept bringing back
            // old pins whenever you tried to reset the view.
        });

        // --- MAP LOGIC (BULLETPROOF PLOTTING) ---
        function initMap() {
            map = L.map('map', { center: DEFAULT_CENTER, zoom: DEFAULT_ZOOM });
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                subdomains: 'abc',
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);
            
            // Fix rendering issues if map is initialized while hidden or resizing
            setTimeout(() => map.invalidateSize(), 200);
            window.addEventListener('resize', () => map.invalidateSize());
        }

        function clearMap() {
            mapMarkers.forEach(m => map.removeLayer(m));
            mapMarkers = [];
            document.getElementById('pointCount').innerText = "0";
            document.getElementById('jobCount').innerText = "0";
        }

        function plotPoints(points, color = '#f59e0b') {
            let validPoints = 0;
            points.forEach(p => {
                const lat = parseFloat(p.lat);
                const lng = parseFloat(p.lng);
                
                // Skip invalid coordinates
                if (isNaN(lat) || isNaN(lng) || (lat === 0 && lng === 0)) return;

                validPoints++;
                const icon = L.divIcon({
                    className: '',
                    html: `<div style="width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95) 0%, ${color} 45%, rgba(0,0,0,0.55) 100%);border:1px solid rgba(255,255,255,0.7);box-shadow:0 2px 5px rgba(0,0,0,0.55);"></div>`,
                    iconSize: [14, 14], iconAnchor: [7, 7]
                });

                let popup = `<b>${p.type || 'Detection'}</b><br>Lat: ${lat.toFixed(5)}<br>Lng: ${lng.toFixed(5)}`;
                if (p.confidence) popup += `<br>Conf: ${(p.confidence * 100).toFixed(1)}%`;
                if (p.detection_count) popup += `<br>Detections: ${p.detection_count}`;
                if (p.frame !== undefined) popup += `<br>Frame: ${p.frame}`;

                const marker = L.marker([lat, lng], { icon }).bindPopup(popup).addTo(map);
                mapMarkers.push(marker);
            });
            return validPoints;
        }

        // Clears every pin and snaps the view back to the default
        // center/zoom. Deliberately does NOT re-fetch /api/map/all-jobs or
        // re-plot any previously completed jobs - that was the old
        // "Refresh Map" behavior, and it meant old points kept reappearing
        // every time you clicked it. Points now only ever show up again
        // when you explicitly click "Plot on Map" for a job.
        function clearMapView() {
            console.log("Clearing map (no auto-reload of past jobs)...");
            clearMap();
            map.invalidateSize();
            map.setView(DEFAULT_CENTER, DEFAULT_ZOOM);
        }

        // Manually plot the currently-active job's lat/long points on the
        // map. This is the explicit "Plot on Map" button next to Results —
        // it doesn't wait for the 1.5s auto-refresh after a job completes.
        async function plotCurrentJobOnMap() {
            if (!currentJobId) {
                alert("No completed job yet. Run a detection first.");
                return;
            }
            const btn = document.getElementById('plotMapBtn');
            const original = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Plotting...';
            try {
                await loadJobMap(currentJobId);
            } finally {
                btn.disabled = false;
                btn.innerHTML = original;
            }
        }

        async function loadJobMap(jobId) {
            try {
                const res = await fetch(`/api/jobs/${jobId}/map-data`);
                const data = await res.json();
                
                if (data.error) {
                    alert("Map data error: " + data.error + "\n(Note: Ensure your GPS CSV has 'latitude' and 'longitude' columns, and matches the frame numbers in detections).");
                    return;
                }

                // Clear the map first so this job's points are shown cleanly
                // rather than piled on top of whatever was there before.
                clearMap();

                if (data.points && data.points.length > 0) {
                    plotPoints(data.points, '#f59e0b');
                    document.getElementById('pointCount').innerText = mapMarkers.length;
                    document.getElementById('jobCount').innerText = 1;
                    map.invalidateSize();
                    map.fitBounds(L.featureGroup(mapMarkers).getBounds().pad(0.2), { maxZoom: 16 });
                } else {
                    console.warn("No points returned for job", jobId);
                    map.setView(DEFAULT_CENTER, DEFAULT_ZOOM);
                    alert("No lat/long points were found for this job. Check that the GPS CSV was uploaded and its frame numbers overlap with the video.");
                }
            } catch (e) {
                console.error("Failed to load job map", e);
            }
        }

        // --- VIDEO PLAYBACK & MAP MINIMIZE ---

        // Shrinks the map down to a thin header strip (or restores it),
        // giving the video section room to grow. Toggled by the button in
        // the map's own header, so it works independent of video playback.
        function toggleMapSection() {
            const mapContainer = document.getElementById('mapContainer');
            const btn = document.getElementById('mapMinimizeBtn');
            const minimized = mapContainer.classList.toggle('minimized');

            btn.innerHTML = minimized
                ? '<i class="fas fa-expand-alt"></i>'
                : '<i class="fas fa-compress-alt"></i>';
            btn.title = minimized
                ? "Restore the map to full size"
                : "Minimize the map to make room for the video";

            // Leaflet needs to recompute its size after the container's
            // dimensions actually change (post-transition), or tiles render
            // at the wrong size/position.
            setTimeout(() => { if (map) map.invalidateSize(); }, 260);
        }

        // Loads a job's output video into the player and shows the video
        // section. Doesn't force the map closed if the user already
        // restored it - only minimizes it the first time, so repeated
        // "Play Video" clicks don't fight a manual resize.
        function playJobVideo(jobId) {
            const videoEl = document.getElementById('resultVideo');
            const errorEl = document.getElementById('videoError');
            errorEl.style.display = 'none';
            errorEl.innerText = '';

            // Force a fresh load rather than relying on the browser to
            // notice the src changed - and clear any previous error state.
            videoEl.pause();
            videoEl.src = `/api/download/${jobId}/video`;
            videoEl.load();

            document.getElementById('videoContainer').classList.add('show');

            const mapContainer = document.getElementById('mapContainer');
            if (!mapContainer.classList.contains('minimized')) {
                toggleMapSection();
            }

            videoEl.play().catch(() => {
                // Autoplay can be blocked by the browser - the controls are
                // still there so the user can just press play manually.
                // Real load/decoding failures are reported by the
                // 'error' listener below, not this catch.
            });
        }

        // Surfaces real playback failures (404 from the backend because
        // this job's model type never produced a video, network error,
        // unsupported codec, etc.) instead of the player just sitting
        // there looking like nothing happened.
        document.getElementById('resultVideo').addEventListener('error', () => {
            const videoEl = document.getElementById('resultVideo');
            const errorEl = document.getElementById('videoError');
            const err = videoEl.error;
            let message = "Video failed to load.";
            if (err) {
                if (err.code === err.MEDIA_ERR_SRC_NOT_SUPPORTED) {
                    message = "No video is available for this job (the selected model may not produce an output video), or the file could not be found.";
                } else if (err.code === err.MEDIA_ERR_NETWORK) {
                    message = "Network error while loading the video. Check that the backend is reachable.";
                } else if (err.code === err.MEDIA_ERR_DECODE) {
                    message = "The video file appears to be corrupted or uses an unsupported codec.";
                }
            }
            errorEl.innerText = message;
            errorEl.style.display = 'block';
        });

        async function playCurrentJobVideo() {
            if (!currentJobId) {
                alert("No completed job yet. Run a detection first.");
                return;
            }
            playJobVideo(currentJobId);
        }

        // Stops playback, releases the video element, hides the video
        // section, and restores the map to full size.
        function closeVideoSection() {
            const videoEl = document.getElementById('resultVideo');
            videoEl.pause();
            videoEl.removeAttribute('src');
            videoEl.load();

            const errorEl = document.getElementById('videoError');
            errorEl.style.display = 'none';
            errorEl.innerText = '';

            document.getElementById('videoContainer').classList.remove('show');

            const mapContainer = document.getElementById('mapContainer');
            if (mapContainer.classList.contains('minimized')) {
                toggleMapSection();
            }
        }

        // --- MODEL MANAGEMENT (FIXED VISIBILITY) ---
        async function fetchModels() {
            try {
                const res = await fetch('/api/models');
                const data = await res.json();
                models = data.models || [];
                activeModelId = data.active_model_id;
                renderModels();
            } catch (e) {
                document.getElementById('modelList').innerHTML = `<div style="text-align:center;color:var(--red);">Failed to load models</div>`;
            }
        }

        function renderModels() {
            const list = document.getElementById('modelList');
            if (models.length === 0) {
                list.innerHTML = `<div style="text-align:center;color:var(--muted);padding:10px;">No models found. Add one!</div>`;
                return;
            }

            const icons = { streetlight: 'fa-lightbulb', pothole: 'fa-road', yolo_detection: 'fa-crosshairs', yolo_segmentation: 'fa-draw-polygon', custom: 'fa-cog' };
            const colors = { streetlight: 'var(--orange)', pothole: 'var(--red)', yolo_detection: 'var(--blue)', yolo_segmentation: 'var(--purple)', custom: 'var(--green)' };

            list.innerHTML = models.map(m => `
                <div class="model-item ${m.model_id === activeModelId ? 'active' : ''}" onclick="switchModel('${m.model_id}')">
                    <div class="model-icon" style="background: ${colors[m.model_type] || 'var(--blue)'}20; color: ${colors[m.model_type] || 'var(--blue)'}">
                        <i class="fas ${icons[m.model_type] || 'fa-cube'}"></i>
                    </div>
                    <div class="model-details">
                        <div class="model-name">${m.name}</div>
                        <div class="model-type">${m.model_type}</div>
                    </div>
                    ${m.model_id === activeModelId ? '<span class="active-badge">ACTIVE</span>' : ''}
                </div>
            `).join('');
        }

        async function switchModel(modelId) {
            try {
                const res = await fetch(`/api/models/${modelId}/activate`, { method: 'POST' });
                if (res.ok) {
                    activeModelId = modelId;
                    renderModels();
                    checkFormValidity();
                } else {
                    alert("Failed to switch model");
                }
            } catch (e) { alert("Network error switching model"); }
        }

        function toggleAddModel() {
            document.getElementById('addModelForm').classList.toggle('show');
        }

        async function uploadNewModel() {
            const name = document.getElementById('newModelName').value;
            const type = document.getElementById('newModelType').value;
            const file = document.getElementById('newModelFile').files[0];
            if (!name || !file) return alert("Name and file are required");

            const fd = new FormData();
            fd.append('name', name);
            fd.append('model_type', type);
            fd.append('model_file', file);

            try {
                const res = await fetch('/api/models', { method: 'POST', body: fd });
                if (res.ok) {
                    await fetchModels();
                    document.getElementById('addModelForm').classList.remove('show');
                    document.getElementById('newModelName').value = '';
                    document.getElementById('newModelFile').value = '';
                } else {
                    const err = await res.json();
                    alert("Upload failed: " + (err.detail || "Unknown error"));
                }
            } catch (e) { alert("Network error"); }
        }

        // --- FILE UPLOAD & PROCESSING ---
        function handleFile(input, type) {
            const file = input.files[0];
            if (!file) return;
            
            if (type === 'video') {
                videoFile = file;
                document.getElementById('videoZone').classList.add('filled');
                document.getElementById('videoText').innerText = `✓ ${file.name}`;
            } else {
                gpsFile = file;
                document.getElementById('gpsZone').classList.add('filled');
                document.getElementById('gpsText').innerText = `✓ ${file.name}`;
            }
            checkFormValidity();
        }

        function checkFormValidity() {
            document.getElementById('submitBtn').disabled = !(videoFile && gpsFile && activeModelId);
        }

        async function startProcess() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';

            const fd = new FormData();
            fd.append('video', videoFile);
            fd.append('gps_csv', gpsFile);
            fd.append('model_id', activeModelId);

            try {
                const res = await fetch('/api/process', { method: 'POST', body: fd });
                const data = await res.json();
                
                if (res.ok) {
                    showProgress(data.job_id);
                    startPolling(data.job_id);
                } else {
                    alert("Error: " + (data.detail || "Failed to start"));
                    resetBtn();
                }
            } catch (e) {
                alert("Network error");
                resetBtn();
            }
        }

        function resetBtn() {
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-play"></i> Start Detection';
            checkFormValidity();
        }

        // --- POLLING & REFRESH (FIXED COMPLETION LOGIC) ---
        function showProgress(jobId) {
            currentJobId = jobId;
            document.getElementById('progressSection').classList.add('show');
            document.getElementById('downloadSection').classList.remove('show');
            document.getElementById('jobIdText').innerText = jobId;
            updateProgress('queued', 0);
        }

        // Resets the "Process Video" panel back to its starting state:
        // clears the chosen video/GPS files, hides progress + results,
        // stops any polling, and re-disables the Start button.
        function resetProcessForm() {
            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }

            videoFile = null;
            gpsFile = null;
            currentJobId = null;

            const videoInput = document.getElementById('videoInput');
            const gpsInput = document.getElementById('gpsInput');
            if (videoInput) videoInput.value = '';
            if (gpsInput) gpsInput.value = '';

            const videoZone = document.getElementById('videoZone');
            const gpsZone = document.getElementById('gpsZone');
            videoZone.classList.remove('filled');
            gpsZone.classList.remove('filled');
            document.getElementById('videoText').innerText = 'Click to upload Video';
            document.getElementById('gpsText').innerText = 'Click to upload GPS CSV';

            document.getElementById('progressSection').classList.remove('show');
            document.getElementById('downloadSection').classList.remove('show');
            document.getElementById('jobIdText').innerText = '-';
            updateProgress('queued', 0);

            resetBtn();
        }

        function updateProgress(status, pct, label) {
            document.getElementById('statusBadge').className = `status status-${status}`;
            document.getElementById('statusBadge').innerText = status.charAt(0).toUpperCase() + status.slice(1);
            const fill = document.getElementById('progressBar');
            fill.classList.remove('indeterminate');
            fill.style.width = pct + '%';
            document.getElementById('pctText').innerText = label !== undefined ? label : (pct + '%');
        }

        // Used when the backend can't report a reliable total frame count
        // (this happens for some video codecs/containers - notably the
        // pothole model's video-only pipeline, where cv2 sometimes can't
        // read a frame count up front, unlike the street light pipeline
        // which always has one). Rather than sitting stuck at 0% forever,
        // show a moving indeterminate bar plus how many frames have been
        // processed so far, so it's still clearly visible that work is
        // happening.
        function updateProgressIndeterminate(label) {
            document.getElementById('statusBadge').className = 'status status-running';
            document.getElementById('statusBadge').innerText = 'Running';
            const fill = document.getElementById('progressBar');
            fill.classList.add('indeterminate');
            document.getElementById('pctText').innerText = label;
        }

        function startPolling(jobId) {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(() => pollJob(jobId), 2000);
        }

        async function pollJob(jobId) {
            try {
                const res = await fetch(`/api/status/${jobId}`);
                const data = await res.json();

                if (data.status === 'running') {
                    const p = data.progress || {};
                    if (p.total && p.total > 0) {
                        const pct = Math.min(100, Math.round((p.done / p.total) * 100));
                        updateProgress('running', pct);
                    } else if (p.done) {
                        // Total frame count isn't known yet/at all for this
                        // job - show movement based on frames done so far
                        // instead of freezing at 0%.
                        updateProgressIndeterminate(`Processing… ${p.done} frames done`);
                    } else {
                        updateProgressIndeterminate('Starting…');
                    }
                } 
                else if (data.status === 'done') {
                    clearInterval(pollInterval);
                    pollInterval = null;
                    updateProgress('done', 100);
                    showDownloads(data.download_urls, data.summary);
                    resetBtn();
                    // NOTE: this used to auto-refresh the map 1.5s after
                    // completion. That's removed — map updates are now
                    // strictly manual via the "Plot on Map" button (for
                    // just this job) or "Refresh Map" (for all jobs), so
                    // nothing gets plotted before you ask for it.
                } 
                else if (data.status === 'failed') {
                    clearInterval(pollInterval);
                    pollInterval = null;
                    updateProgress('failed', 0);
                    alert("Job Failed: " + (data.error || "Unknown error"));
                    resetBtn();
                }
            } catch (e) {
                console.error("Poll error", e);
            }
        }

        function showDownloads(urls, summary) {
            const sec = document.getElementById('downloadSection');
            sec.classList.add('show');
            
            let html = `<div style="margin-bottom:10px; font-size:13px; color:var(--muted);">Frames: ${summary.frames_processed} | Detections: ${summary.detection_rows}</div>`;
            
            const links = [
                { key: 'csv', icon: 'fa-file-csv', name: 'Detection CSV' },
                { key: 'video', icon: 'fa-video', name: 'Output Video' },
                { key: 'frames_zip', icon: 'fa-images', name: 'Detected Frames (ZIP)' },
                { key: 'all', icon: 'fa-file-archive', name: 'Download All (ZIP)' }
            ];

            links.forEach(l => {
                if (urls[l.key]) {
                    html += `<a href="/api${urls[l.key]}" class="dl-link" download><i class="fas ${l.icon}" style="width:20px;text-align:center;color:var(--blue)"></i> ${l.name}</a>`;
                }
            });

            document.getElementById('downloadLinks').innerHTML = html;

            // This model type may never produce a video (yolo_detection /
            // yolo_segmentation / custom jobs, for example) - only offer
            // playback when the backend actually reported a video URL,
            // instead of always showing the button and letting it fail
            // with a generic "no video available" error every time.
            const playBtn = document.getElementById('playVideoBtn');
            playBtn.style.display = urls.video ? '' : 'none';
        }

        // --- HEALTH ---
        async function fetchHealth() {
            try {
                const res = await fetch('/api/health');
                const data = await res.json();
                if (data.status === 'ok') {
                    document.getElementById('healthStatus').innerHTML = `<div class="dot ok"></div> Connected (${data.models_count} models)`;
                } else throw new Error();
            } catch {
                document.getElementById('healthStatus').innerHTML = `<div class="dot fail"></div> Backend Offline`;
            }
        }
    </script>
</body>
</html>
